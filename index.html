<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: "#111827", card: "#1f2937", border: "#374151" },
          },
        },
      },
    };
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-900 via-gray-900 to-black text-gray-100 antialiased">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useCallback, useEffect, useRef } = React;

    const API_BASE = (() => {
      const { protocol, hostname, port } = window.location;
      if (protocol === "file:") return "http://localhost:8000";
      if (port === "8000" || port === "") return "";
      if (hostname === "localhost" || hostname === "127.0.0.1") return "http://localhost:8000";
      return "";
    })();

    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: { "Content-Type": "application/json", ...options.headers },
        ...options,
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) {}
      if (!res.ok) {
        const detail = data?.detail ?? text ?? res.statusText;
        throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
      }
      return data;
    }

    function App() {
      const [url, setUrl] = useState("");
      const [info, setInfo] = useState(null);
      const [formats, setFormats] = useState([]);
      const [formatId, setFormatId] = useState("bestvideo+bestaudio");
      const [loadingInfo, setLoadingInfo] = useState(false);
      const [infoError, setInfoError] = useState(null);

      const [jobId, setJobId] = useState(null);
      const [jobStatus, setJobStatus] = useState(null);
      const [jobError, setJobError] = useState(null);
      const pollRef = useRef(null);

      const stopPoll = useCallback(() => {
        if (pollRef.current) {
          clearInterval(pollRef.current);
          pollRef.current = null;
        }
      }, []);

      useEffect(() => () => stopPoll(), [stopPoll]);

      const fetchInfo = async () => {
        setInfoError(null);
        setInfo(null);
        setFormats([]);
        setLoadingInfo(true);
        try {
          const data = await api("/api/info", {
            method: "POST",
            body: JSON.stringify({ url: url.trim() }),
          });
          setInfo(data);
          const list = (data.formats || []).filter((f) => f.format_id);
          setFormats(list);
        } catch (e) {
          setInfoError(e.message || String(e));
        } finally {
          setLoadingInfo(false);
        }
      };

      const startJob = async () => {
        setJobError(null);
        setJobStatus(null);
        setJobId(null);
        stopPoll();
        try {
          const data = await api("/api/jobs", {
            method: "POST",
            body: JSON.stringify({
              url: url.trim(),
              format_id: formatId || "bestvideo+bestaudio",
            }),
          });
          setJobId(data.job_id);
        } catch (e) {
          setJobError(e.message || String(e));
        }
      };

      const pollJob = useCallback(async (id) => {
        try {
          const s = await api(`/api/jobs/${id}`, { method: "GET" });
          setJobStatus(s);
          if (s.status === "completed" || s.status === "failed") {
            stopPoll();
            if (s.status === "failed" && s.error) setJobError(s.error);
          }
        } catch (e) {
          stopPoll();
          setJobError(e.message || String(e));
        }
      }, [stopPoll]);

      useEffect(() => {
        if (!jobId) return;
        pollJob(jobId);
        pollRef.current = setInterval(() => pollJob(jobId), 2500);
        return () => stopPoll();
      }, [jobId, pollJob, stopPoll]);

      const progress =
        jobStatus && typeof jobStatus.progress === "number"
          ? Math.min(100, Math.max(0, jobStatus.progress))
          : 0;
      const showProgress =
        jobId && jobStatus && !["completed", "failed"].includes(jobStatus.status);

      return (
        <div className="max-w-lg mx-auto px-4 py-12">
          <h1 className="text-2xl font-semibold tracking-tight text-white mb-1">
            Video Downloader
          </h1>
          <p className="text-sm text-gray-400 mb-8">
            MVP: FastAPI background jobs · yt-dlp · FFmpeg · Poll every ~2.5s
          </p>

          <label className="block text-xs font-medium text-gray-400 mb-1.5">Video URL</label>
          <input
            type="url"
            className="w-full rounded-xl bg-surface-card border border-surface-border px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="https://www.youtube.com/watch?v=…"
            value={url}
            onChange={(e) => setUrl(e.target.value)}
          />

          <div className="mt-4 flex flex-wrap gap-2">
            <button
              type="button"
              onClick={fetchInfo}
              disabled={loadingInfo || !url.trim()}
              className="rounded-xl bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:pointer-events-none px-4 py-2 text-sm font-medium text-white"
            >
              {loadingInfo ? "Loading…" : "Fetch info"}
            </button>
          </div>

          {infoError && (
            <p className="mt-3 text-sm text-red-400 whitespace-pre-wrap">{infoError}</p>
          )}

          {info && (
            <div className="mt-8 rounded-2xl border border-surface-border bg-surface-card/80 p-4 backdrop-blur-sm">
              <h2 className="text-xs font-semibold uppercase tracking-wider text-gray-500 mb-3">
                Preview
              </h2>
              {info.thumbnail && (
                <img
                  src={info.thumbnail}
                  alt=""
                  className="w-full max-h-48 object-cover rounded-xl mb-3 bg-black/40"
                />
              )}
              <p className="text-base font-medium text-white leading-snug">{info.title}</p>

              <label className="block text-xs font-medium text-gray-400 mt-4 mb-1.5">
                Format / quality
              </label>
              <select
                className="w-full rounded-xl bg-gray-900 border border-surface-border px-3 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                value={formatId}
                onChange={(e) => setFormatId(e.target.value)}
              >
                <option value="bestvideo+bestaudio">Best video + audio (recommended)</option>
                {formats.map((f) => (
                  <option key={f.format_id} value={f.format_id}>
                    {[f.format_id, f.resolution, f.ext].filter(Boolean).join(" · ")}
                  </option>
                ))}
              </select>

              <button
                type="button"
                onClick={startJob}
                disabled={!url.trim()}
                className="mt-4 w-full rounded-xl bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 disabled:pointer-events-none py-2.5 text-sm font-medium text-white"
              >
                Download
              </button>
            </div>
          )}

          {jobError && (
            <p className="mt-4 text-sm text-red-400 whitespace-pre-wrap">{jobError}</p>
          )}

          {jobId && (
            <div className="mt-6 rounded-2xl border border-surface-border bg-surface-card/80 p-4">
              <h2 className="text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">
                Job
              </h2>
              <p className="text-sm text-gray-300 capitalize">
                {jobStatus?.status ?? "queued"}
                {typeof jobStatus?.progress === "number" ? ` · ${jobStatus.progress}%` : ""}
              </p>
              {showProgress && (
                <div className="mt-3 h-2 rounded-full bg-gray-800 overflow-hidden">
                  <div
                    className="h-full rounded-full bg-blue-500 transition-all duration-300"
                    style={{ width: `${Math.max(progress, 3)}%` }}
                  />
                </div>
              )}
              {jobStatus?.status === "completed" && (
                <a
                  href={`${API_BASE}/api/files/${jobId}`}
                  download
                  className="inline-block mt-3 text-sm font-medium text-blue-400 hover:text-blue-300"
                >
                  Save file
                </a>
              )}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>

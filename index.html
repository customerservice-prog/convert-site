<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Convert Site — YouTube downloads</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { card: "#1f2937", border: "#374151" },
          },
        },
      },
    };
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-900 via-gray-900 to-black text-gray-100 antialiased flex flex-col">
  <div id="root" class="flex-1"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useCallback, useEffect, useRef } = React;

    const LS_JOB = "convert_site_active_job";

    const API_BASE = (() => {
      const { protocol, hostname, port } = window.location;
      if (protocol === "file:") return "http://localhost:8000";
      if (port === "8000" || port === "") return "";
      if (hostname === "localhost" || hostname === "127.0.0.1") return "http://localhost:8000";
      return "";
    })();

    function parseErrorDetail(data, fallback) {
      const d = data?.detail;
      if (d && typeof d === "object" && d.message) return d.message;
      if (typeof d === "string") return d;
      return fallback || "Request failed";
    }

    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: { "Content-Type": "application/json", ...options.headers },
        ...options,
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) {}
      if (!res.ok) {
        throw new Error(parseErrorDetail(data, res.statusText));
      }
      return data;
    }

    function App() {
      const [url, setUrl] = useState("");
      const [info, setInfo] = useState(null);
      const [formats, setFormats] = useState([]);
      const [formatId, setFormatId] = useState("bestvideo+bestaudio/best");
      const [outputType, setOutputType] = useState("video");
      const [loadingInfo, setLoadingInfo] = useState(false);
      const [infoError, setInfoError] = useState(null);

      const [jobId, setJobId] = useState(() => localStorage.getItem(LS_JOB) || null);
      const [jobStatus, setJobStatus] = useState(null);
      const [jobError, setJobError] = useState(null);
      const [startingJob, setStartingJob] = useState(false);
      const pollRef = useRef(null);

      const stopPoll = useCallback(() => {
        if (pollRef.current) {
          clearInterval(pollRef.current);
          pollRef.current = null;
        }
      }, []);

      useEffect(() => () => stopPoll(), [stopPoll]);

      const fetchInfo = async () => {
        setInfoError(null);
        setInfo(null);
        setFormats([]);
        setLoadingInfo(true);
        try {
          const data = await api("/api/info", {
            method: "POST",
            body: JSON.stringify({ url: url.trim() }),
          });
          setInfo(data);
          setFormats((data.formats || []).filter((f) => f.format_id));
        } catch (e) {
          setInfoError(e.message || String(e));
        } finally {
          setLoadingInfo(false);
        }
      };

      const startJob = async () => {
        if (startingJob) return;
        setJobError(null);
        setJobStatus(null);
        setStartingJob(true);
        stopPoll();
        try {
          const fmt =
            outputType === "audio"
              ? "bestaudio/best"
              : formatId || "bestvideo+bestaudio/best";
          const data = await api("/api/jobs", {
            method: "POST",
            body: JSON.stringify({
              url: url.trim(),
              format_id: fmt,
              output_type: outputType,
            }),
          });
          setJobId(data.job_id);
          localStorage.setItem(LS_JOB, data.job_id);
        } catch (e) {
          setJobError(e.message || String(e));
        } finally {
          setStartingJob(false);
        }
      };

      const pollJob = useCallback(async (id) => {
        try {
          const s = await api(`/api/jobs/${id}`, { method: "GET" });
          setJobStatus(s);
          if (s.status === "completed" || s.status === "failed" || s.status === "expired") {
            stopPoll();
            if (s.status === "failed" && s.error) setJobError(s.error);
            if (s.status === "expired") setJobError("This download has expired. Start a new one.");
            if (s.status === "completed" || s.status === "failed" || s.status === "expired") {
              localStorage.removeItem(LS_JOB);
            }
          }
        } catch (e) {
          stopPoll();
          setJobError(e.message || String(e));
        }
      }, [stopPoll]);

      useEffect(() => {
        if (!jobId) return;
        pollJob(jobId);
        pollRef.current = setInterval(() => pollJob(jobId), 2500);
        return () => stopPoll();
      }, [jobId, pollJob, stopPoll]);

      const clearJob = () => {
        stopPoll();
        setJobId(null);
        setJobStatus(null);
        setJobError(null);
        localStorage.removeItem(LS_JOB);
      };

      const progress =
        jobStatus && typeof jobStatus.progress === "number"
          ? Math.min(100, Math.max(0, jobStatus.progress))
          : 0;
      const terminal = jobStatus && ["completed", "failed", "expired"].includes(jobStatus.status);
      const showProgress = jobId && jobStatus && !terminal;

      return (
        <>
          <header className="border-b border-surface-border/80 bg-black/20 backdrop-blur-sm">
            <div className="max-w-lg mx-auto px-4 py-4 flex items-center justify-between gap-3">
              <div>
                <span className="text-lg font-semibold text-white tracking-tight">Convert Site</span>
                <p className="text-xs text-gray-500">YouTube · temporary files · rate limits apply</p>
              </div>
              <a
                href="/health"
                className="text-xs text-gray-500 hover:text-gray-300 hidden sm:inline"
                target="_blank"
                rel="noreferrer"
              >
                Status
              </a>
            </div>
          </header>

          <div className="max-w-lg mx-auto px-4 py-8 flex-1 w-full">
            <p className="text-sm text-gray-400 mb-6 leading-relaxed">
              Paste a <strong className="text-gray-300">YouTube</strong> link. We fetch formats, then
              download in the background. Files are kept for a limited time — download soon.
            </p>

            <label className="block text-xs font-medium text-gray-400 mb-1.5">Video URL</label>
            <input
              type="url"
              className="w-full rounded-xl bg-surface-card border border-surface-border px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="https://www.youtube.com/watch?v=…"
              value={url}
              onChange={(e) => setUrl(e.target.value)}
            />

            <div className="mt-4 flex flex-wrap gap-2 items-center">
              <button
                type="button"
                onClick={fetchInfo}
                disabled={loadingInfo || !url.trim()}
                className="rounded-xl bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:pointer-events-none px-4 py-2 text-sm font-medium text-white inline-flex items-center gap-2"
              >
                {loadingInfo && (
                  <span className="inline-block h-3.5 w-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                )}
                {loadingInfo ? "Analyzing…" : "Fetch info"}
              </button>
            </div>

            {infoError && (
              <div className="mt-4 rounded-xl border border-red-900/50 bg-red-950/30 px-3 py-2 text-sm text-red-300 whitespace-pre-wrap">
                {infoError}
              </div>
            )}

            {info && (
              <div className="mt-8 rounded-2xl border border-surface-border bg-surface-card/80 p-4 backdrop-blur-sm">
                <h2 className="text-xs font-semibold uppercase tracking-wider text-gray-500 mb-3">
                  Preview
                </h2>
                {info.thumbnail && (
                  <img
                    src={info.thumbnail}
                    alt=""
                    className="w-full max-h-52 object-cover rounded-xl mb-3 bg-black/40"
                  />
                )}
                <p className="text-base font-medium text-white leading-snug break-words">{info.title}</p>

                <fieldset className="mt-4">
                  <legend className="text-xs font-medium text-gray-400 mb-2">Output</legend>
                  <div className="flex gap-3 text-sm">
                    <label className="inline-flex items-center gap-2 cursor-pointer">
                      <input
                        type="radio"
                        name="out"
                        checked={outputType === "video"}
                        onChange={() => setOutputType("video")}
                        className="text-blue-500"
                      />
                      <span>Video (MP4)</span>
                    </label>
                    <label className="inline-flex items-center gap-2 cursor-pointer">
                      <input
                        type="radio"
                        name="out"
                        checked={outputType === "audio"}
                        onChange={() => {
                          setOutputType("audio");
                          setFormatId("bestaudio/best");
                        }}
                        className="text-blue-500"
                      />
                      <span>Audio (M4A)</span>
                    </label>
                  </div>
                </fieldset>

                {outputType === "video" && (
                  <>
                    <label className="block text-xs font-medium text-gray-400 mt-4 mb-1.5">
                      Quality
                    </label>
                    <select
                      className="w-full rounded-xl bg-gray-900 border border-surface-border px-3 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                      value={formatId}
                      onChange={(e) => setFormatId(e.target.value)}
                    >
                      <option value="bestvideo+bestaudio/best">Best quality (recommended)</option>
                      {formats.map((f) => (
                        <option key={f.format_id} value={f.format_id}>
                          {[f.format_id, f.resolution, f.ext].filter(Boolean).join(" · ")}
                        </option>
                      ))}
                    </select>
                  </>
                )}

                <button
                  type="button"
                  onClick={startJob}
                  disabled={!url.trim() || startingJob}
                  className="mt-4 w-full rounded-xl bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 disabled:pointer-events-none py-2.5 text-sm font-medium text-white inline-flex items-center justify-center gap-2"
                >
                  {startingJob && (
                    <span className="inline-block h-4 w-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                  )}
                  {startingJob ? "Starting…" : "Start download"}
                </button>
              </div>
            )}

            {jobError && (
              <div className="mt-4 rounded-xl border border-red-900/50 bg-red-950/30 px-3 py-2 text-sm text-red-300 whitespace-pre-wrap">
                {jobError}
              </div>
            )}

            {jobId && (
              <div className="mt-6 rounded-2xl border border-surface-border bg-surface-card/80 p-4">
                <div className="flex justify-between items-start gap-2">
                  <h2 className="text-xs font-semibold uppercase tracking-wider text-gray-500">
                    Download
                  </h2>
                  <button
                    type="button"
                    onClick={clearJob}
                    className="text-xs text-gray-500 hover:text-gray-300"
                  >
                    Dismiss
                  </button>
                </div>
                <p className="text-sm text-gray-300 mt-1 capitalize">
                  {jobStatus?.stage
                    ? `${jobStatus.status.replace(/_/g, " ")} — ${jobStatus.stage}`
                    : jobStatus?.status ?? "queued"}
                  {typeof jobStatus?.progress === "number" ? ` · ${jobStatus.progress}%` : ""}
                </p>
                {jobStatus?.expires_at && jobStatus.status === "completed" && (
                  <p className="text-xs text-amber-200/80 mt-1">
                    Expires soon — save your file while the link works.
                  </p>
                )}
                {showProgress && (
                  <div className="mt-3 h-2 rounded-full bg-gray-800 overflow-hidden">
                    <div
                      className="h-full rounded-full bg-blue-500 transition-all duration-300"
                      style={{ width: `${Math.max(progress, 3)}%` }}
                    />
                  </div>
                )}
                {jobStatus?.status === "completed" && (
                  <a
                    href={`${API_BASE}/api/files/${jobId}`}
                    download
                    className="inline-block mt-3 text-sm font-medium text-blue-400 hover:text-blue-300"
                  >
                    Save file
                  </a>
                )}
              </div>
            )}

            <p className="mt-10 text-xs text-gray-600 leading-relaxed">
              By using this service you agree to our{" "}
              <a href="/legal/terms" className="text-gray-500 underline hover:text-gray-400">
                Terms
              </a>{" "}
              and{" "}
              <a href="/legal/privacy" className="text-gray-500 underline hover:text-gray-400">
                Privacy Policy
              </a>
              . Only download content you are allowed to use.
            </p>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube Downloader</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7edf5;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-dim: #2a5fad;
      --danger: #f87171;
      --radius: 12px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }
    #root { max-width: 640px; margin: 0 auto; padding: 2.5rem 1.25rem 3rem; }
    h1 {
      font-size: 1.65rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="url"], select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
    }
    input:focus, select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .row { margin-bottom: 1.1rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1.25rem; }
    button {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.6rem 1.1rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button:hover:not(:disabled) { background: var(--accent-dim); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.secondary:hover:not(:disabled) { border-color: var(--muted); background: var(--surface); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      padding: 1.1rem 1.15rem;
      margin-top: 1.25rem;
    }
    .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 0 0 0.75rem; }
    .meta-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.5rem; }
    .thumb {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 0.75rem;
      background: var(--bg);
    }
    .progress-wrap {
      height: 8px;
      background: var(--bg);
      border-radius: 999px;
      overflow: hidden;
      margin: 0.75rem 0;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      border-radius: 999px;
      transition: width 0.25s ease;
    }
    .status-msg { font-size: 0.9rem; color: var(--muted); }
    .err { color: var(--danger); font-size: 0.9rem; margin-top: 0.5rem; white-space: pre-wrap; }
    a.dl {
      display: inline-block;
      margin-top: 0.75rem;
      color: var(--accent);
      font-weight: 500;
    }
    a.dl:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useCallback, useEffect, useRef } = React;

    const API_BASE = (() => {
      const { protocol, hostname, port } = window.location;
      if (protocol === "file:") return "http://localhost:8000";
      if (port === "8000" || port === "") return "";
      if (hostname === "localhost" || hostname === "127.0.0.1") return "http://localhost:8000";
      return "";
    })();

    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: { "Content-Type": "application/json", ...options.headers },
        ...options,
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) {}
      if (!res.ok) {
        const detail = data?.detail ?? text ?? res.statusText;
        throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
      }
      return data;
    }

    function App() {
      const [url, setUrl] = useState("");
      const [meta, setMeta] = useState(null);
      const [formats, setFormats] = useState([]);
      const [formatId, setFormatId] = useState("");
      const [loadingMeta, setLoadingMeta] = useState(false);
      const [metaError, setMetaError] = useState(null);

      const [taskId, setTaskId] = useState(null);
      const [status, setStatus] = useState(null);
      const [downloadError, setDownloadError] = useState(null);
      const pollRef = useRef(null);

      const stopPoll = useCallback(() => {
        if (pollRef.current) {
          clearInterval(pollRef.current);
          pollRef.current = null;
        }
      }, []);

      useEffect(() => () => stopPoll(), [stopPoll]);

      const fetchMetadata = async () => {
        setMetaError(null);
        setMeta(null);
        setFormats([]);
        setFormatId("");
        setLoadingMeta(true);
        try {
          const data = await api("/metadata", {
            method: "POST",
            body: JSON.stringify({ url: url.trim() }),
          });
          setMeta(data);
          const list = (data.formats || []).filter((f) => f.format_id);
          setFormats(list);
          const combined = list.find((f) => f.vcodec && f.vcodec !== "none" && f.acodec && f.acodec !== "none");
          const best = combined || list.find((f) => f.vcodec && f.vcodec !== "none") || list[0];
          if (best) setFormatId(best.format_id);
        } catch (e) {
          setMetaError(e.message || String(e));
        } finally {
          setLoadingMeta(false);
        }
      };

      const startDownload = async () => {
        setDownloadError(null);
        setStatus(null);
        setTaskId(null);
        stopPoll();
        try {
          const { id } = await api("/download/start", {
            method: "POST",
            body: JSON.stringify({
              url: url.trim(),
              format_id: formatId || null,
            }),
          });
          setTaskId(id);
        } catch (e) {
          setDownloadError(e.message || String(e));
        }
      };

      const pollOnce = useCallback(async (id) => {
        try {
          const s = await api(`/download/status/${id}`, { method: "GET" });
          setStatus(s);
          if (s.state === "SUCCESS" || s.state === "FAILURE") {
            stopPoll();
            if (s.state === "FAILURE" && s.error) setDownloadError(s.error);
          }
        } catch (e) {
          stopPoll();
          setDownloadError(e.message || String(e));
        }
      }, [stopPoll]);

      useEffect(() => {
        if (!taskId) return;
        pollOnce(taskId);
        pollRef.current = setInterval(() => pollOnce(taskId), 1200);
        return () => stopPoll();
      }, [taskId, pollOnce, stopPoll]);

      const pct = status && typeof status.progress === "number" ? Math.min(100, Math.max(0, status.progress)) : null;
      const showBar = status && status.state !== "SUCCESS" && status.state !== "FAILURE" && taskId;

      return (
        <>
          <h1>YouTube Downloader</h1>
          <p className="sub">Paste a link, pick a format, download as MP4 (FFmpeg merge). Backend runs on port 8000.</p>

          <div className="row">
            <label htmlFor="url">YouTube URL</label>
            <input
              id="url"
              type="url"
              placeholder="https://www.youtube.com/watch?v=…"
              value={url}
              onChange={(e) => setUrl(e.target.value)}
            />
          </div>

          <div className="actions">
            <button type="button" onClick={fetchMetadata} disabled={loadingMeta || !url.trim()}>
              {loadingMeta ? "Loading…" : "Get video info"}
            </button>
          </div>

          {metaError && <p className="err">{metaError}</p>}

          {meta && (
            <div className="card">
              <h2>Video</h2>
              {meta.thumbnail && <img className="thumb" src={meta.thumbnail} alt="" />}
              <div className="meta-title">{meta.title || "Untitled"}</div>
              <div className="row">
                <label htmlFor="fmt">Format / quality</label>
                <select
                  id="fmt"
                  value={formatId}
                  onChange={(e) => setFormatId(e.target.value)}
                >
                  <option value="">Default (best video + audio)</option>
                  {formats.map((f) => (
                    <option key={f.format_id} value={f.format_id}>
                      {[f.format_id, f.resolution, f.ext].filter(Boolean).join(" · ")}
                    </option>
                  ))}
                </select>
              </div>
              <div className="actions">
                <button type="button" onClick={startDownload} disabled={!url.trim()}>
                  Start download
                </button>
              </div>
            </div>
          )}

          {downloadError && <p className="err">{downloadError}</p>}

          {taskId && (
            <div className="card">
              <h2>Download</h2>
              <p className="status-msg">{status?.message || "Starting…"}</p>
              {showBar && (
                <div className="progress-wrap">
                  <div className="progress-bar" style={{ width: `${pct != null ? pct : 8}%` }} />
                </div>
              )}
              {status?.state === "SUCCESS" && (
                <a className="dl" href={`${API_BASE}/download/file/${taskId}`} download>
                  Save file{status.filename ? ` (${status.filename})` : ""}
                </a>
              )}
            </div>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
